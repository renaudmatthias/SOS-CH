<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>SOS-CH</title>
  <script src="https://cdn.jsdelivr.net/npm/ol@v10.9.0/dist/ol.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.9.0/ol.css">
  <script src="https://cdn.jsdelivr.net/npm/proj4@2.12.1/dist/proj4.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="d-flex flex-column" style="height: 100vh;">

    <header class="d-flex align-items-center justify-content-between py-3 mb-0 border-bottom px-3">
      <img src="Logo.png" alt="SOS-CH" width="100" height="80">
      <div class="text-center">
        <div class="fw-medium">Bienvenue sur SOS-CH</div>
        <div class="fw-normal">Sélectionnez un point, et vous verrez à quelle distance il se trouve des services d'urgence.</div>
      </div>
      <img src="HEIG-VD_logotype_rouge-rvb.png" alt="HEIG-VD" width="100" height="80">
    </header>
  

    <!-- La carte prend tout l'espace restant -->
    <div id="map" class="flex-grow-1">


      <!-- Légende -->
      <div id="map-legend" class="position-absolute bottom-0 start-0 m-3 bg-white rounded-3 shadow-sm p-3 small">
        <div class="d-flex align-items-center gap-2 text-dark mb-2">
          <span class="legend-dot bg-danger"></span> Caserne de pompiers
        </div>
        <div class="d-flex align-items-center gap-2 text-dark mb-2">
          <span class="legend-dot bg-primary"></span> Poste de police
        </div>
        <div class="d-flex align-items-center gap-2 text-dark">
          <span class="legend-dot bg-success"></span> Hôpital
        </div>
      </div>
      <!-- Crédits -->
      <div class="position-absolute bottom-0 end-0 m-3 bg-white rounded-2 shadow-sm p-2" style="z-index: 1000; font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px;">
        <div class="d-flex align-items-center gap-2" style="color: #333;">
          Reto Lazzeri, Matthias Renaud & Florian Zaccomer
        </div>
      </div>
    </div>
</div>
  <script src="script.js"></script>
</body>
</html>
